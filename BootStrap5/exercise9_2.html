<div class="container mt-5">

<h2>Button Groups</h2>

<div class="btn-group">

<button class="btn btn-primary">Left</button>

<button class="btn btn-success">Middle</button>

<button class="btn btn-danger">Right</button>

</div>

<hr>

<h2>Toggle Button</h2>

<input type="checkbox"
       class="btn-check"
       id="btncheck1">

<label class="btn btn-outline-primary"
       for="btncheck1">

Toggle Button

</label>

</div>

</body>
